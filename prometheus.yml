# Config for CloudSentinel-XAI Prometheus metrics monitoring (Susceptible to change based on project requirements)
global:
  scrape_interval: 1s 
  evaluation_interval: 1s

scrape_configs:
  - job_name: "CloudSentinel-XAI Monitoring"
    static_configs:
      - targets: ["localhost:8000"]
        labels:
          app: "CloudSentinel-XAI"