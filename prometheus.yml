# Prometheus config for CloudSentinel-XAI.
# Scrapes the REAL FastAPI app's /metrics endpoint (exposed via
# prometheus_client in app/main.py). Run the app on :8000, e.g.:
#     uvicorn app.main:app --host 0.0.0.0 --port 8000
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "cloudsentinel-app"
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:8000"]
        labels:
          app: "CloudSentinel-XAI"

  # OPTIONAL: the standalone demo simulator (demo_simulator.py) emits
  # SIMULATED data on :8001 for UI testing only. Keep it commented unless
  # you are intentionally demoing the dashboard without live traffic — do
  # NOT scrape it at the same time as the real app or the panels will mix
  # real and fake series.
  # - job_name: "cloudsentinel-demo-sim"
  #   static_configs:
  #     - targets: ["localhost:8001"]
  #       labels:
  #         app: "CloudSentinel-XAI-DEMO-SIMULATED"